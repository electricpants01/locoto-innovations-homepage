<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Smartphone body -->
  <rect x="28" y="8" width="72" height="112" rx="12" ry="12" fill="none" stroke-width="6"/>
  <!-- Screen -->
  <rect x="36" y="24" width="56" height="80" rx="4" ry="4" fill="none" stroke-width="3"/>
  <!-- Home indicator bar -->
  <rect x="48" y="110" width="32" height="3" rx="1.5" ry="1.5" fill="currentColor" stroke="none"/>
  <!-- Top notch/earpiece -->
  <rect x="54" y="13" width="20" height="3" rx="1.5" ry="1.5" fill="currentColor" stroke="none"/>
  <style>
    rect { stroke: #000; }
    @media (prefers-color-scheme: dark) {
      rect { stroke: #FFF; }
    }
  </style>
</svg>
